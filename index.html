<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&display=swap');

body {
  margin: 0;
  overflow: hidden;
  background: #0a0005;
  font-family: 'Playfair Display', Georgia, serif;
}

/* RAIN COLUMNS */
.rain {
  position: absolute;
  top: -180px;
  display: flex;
  flex-direction: column;
  align-items: center;
  font-size: 20px;
  font-weight: 700;
  opacity: 0.65;
  animation: fall linear forwards;
}

.rain span {
  line-height: 16px;
}

@keyframes fall {
  to {
    transform: translateY(125vh);
  }
}

/* CENTER */
.center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  width: 90vw;
}

/* TIMER */
#timer {
  font-size: 110px;
  font-weight: 900;
  color: #e0005e;
  opacity: 0;
  text-shadow:
    0 0 20px #e0005e,
    0 0 60px #9b0040;
  transition: opacity 0.3s;
}

/* TEXT */
#mainText {
  font-size: 85px;
  font-weight: 900;
  color: #e0005e;
  opacity: 0;
  text-align: center;
  transition: opacity 0.5s;
  text-shadow:
    0 0 20px #e0005e,
    0 0 60px #9b0040;
  line-height: 1.1;
}

/* HEART CANVAS */
#heartCanvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  opacity: 0;
  transition: opacity 1s;
  z-index: 10;
}
</style>
</head>

<body>

<canvas id="heartCanvas"></canvas>

<div class="center">
  <div id="timer"></div>
  <div id="mainText"></div>
</div>

<script>
const words = ["Happy", "Birthday", "to", "You"];
const textEl = document.getElementById("mainText");
const timerEl = document.getElementById("timer");

/* START AFTER 3 SEC */
setTimeout(() => {
  startRain();
  startTimer();
}, 3000);

/* CREATE COLUMN */
function createColumn() {
  let div = document.createElement("div");
  div.className = "rain";

  const text = ["h","a","p","p","y","","b","i","r","t","h","d","a","y"];

  text.forEach(char => {
    let span = document.createElement("span");
    span.innerText = char;

    if (char === "") {
      span.style.marginBottom = "12px";
    }

    div.appendChild(span);
  });

  div.style.left = Math.random() * 100 + "vw";
  div.style.animationDuration = (4 + Math.random() * 4) + "s";

  /* Deep, rich expanded color palette */
  const shades = [
    "#e0005e", "#b3004b", "#8c0038", "#cc0055", "#ff0066",
    "#ff3399", "#d4006b", "#ff006a", "#7a0033", "#ff80bf"
  ];
  div.style.color = shades[Math.floor(Math.random() * shades.length)];

  document.body.appendChild(div);

  /* Remove ONLY when animation ends (i.e. reaches bottom of screen) */
  div.addEventListener("animationend", () => {
    div.remove();
  });
}

/* START RAIN */
function startRain() {
  setInterval(() => {
    createColumn();
  }, 120);
}

/* TIMER */
function startTimer() {
  let count = 3;
  timerEl.style.opacity = 1;

  let interval = setInterval(() => {
    timerEl.textContent = count;
    count--;

    if (count < 0) {
      clearInterval(interval);
      timerEl.style.opacity = 0;
      startWords();
    }
  }, 1000);
}

/* SEQUENTIAL WORDS */
let index = 0;

function startWords() {
  showWord();
}

function showWord() {
  if (index >= words.length) {
    showFinal();
    return;
  }

  textEl.textContent = words[index];
  textEl.style.opacity = 1;

  setTimeout(() => {
    textEl.style.opacity = 0;
    index++;
    setTimeout(showWord, 400);
  }, 1400);
}

/* FINAL */
function showFinal() {
  textEl.innerHTML = "Happy Birthday<br>to You";
  textEl.style.opacity = 1;

  /* Show heart after text fades in */
  setTimeout(() => {
    showHeart();
  }, 1200);
}

/* HEART MADE OF PARTICLES */
function showHeart() {
  const canvas = document.getElementById("heartCanvas");
  const ctx = canvas.getContext("2d");

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  canvas.style.opacity = 1;

  const cx = canvas.width / 2;
  const cy = canvas.height / 2 + 60;
  const scale = Math.min(canvas.width, canvas.height) / 420;

  const colors = [
    "#ff0066", "#e0005e", "#ff3399", "#cc0055",
    "#ff80bf", "#b3004b", "#ff006a", "#ff4da6"
  ];

  const particles = [];
  const count = 280;

  for (let i = 0; i < count; i++) {
    const t = (i / count) * Math.PI * 2;
    /* Heart parametric equation */
    const hx = 16 * Math.pow(Math.sin(t), 3);
    const hy = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));

    particles.push({
      /* Start from screen center */
      x: cx,
      y: canvas.height / 2,
      /* Target heart position */
      tx: cx + hx * scale * 10,
      ty: cy + hy * scale * 10,
      size: 3 + Math.random() * 3,
      color: colors[Math.floor(Math.random() * colors.length)],
      progress: 0,
      speed: 0.012 + Math.random() * 0.016,
      delay: Math.random() * 0.5,
    });
  }

  let startTime = null;

  function animate(ts) {
    if (!startTime) startTime = ts;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    let allDone = true;

    particles.forEach(p => {
      const elapsed = (ts - startTime) / 1000;
      if (elapsed < p.delay) { allDone = false; return; }

      p.progress = Math.min(1, p.progress + p.speed);
      if (p.progress < 1) allDone = false;

      /* Ease out cubic */
      const ease = 1 - Math.pow(1 - p.progress, 3);
      const x = p.x + (p.tx - p.x) * ease;
      const y = p.y + (p.ty - p.y) * ease;

      ctx.beginPath();
      ctx.arc(x, y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 8;
      ctx.fill();
    });

    if (!allDone) {
      requestAnimationFrame(animate);
    } else {
      /* Gentle pulse after formed */
      pulseHeart(canvas, ctx, particles, cx, cy, scale, colors);
    }
  }

  requestAnimationFrame(animate);
}

/* PULSE AFTER HEART FORMS */
function pulseHeart(canvas, ctx, particles, cx, cy, scale, colors) {
  let phase = 0;

  function pulse() {
    phase += 0.04;
    const s = 1 + 0.06 * Math.sin(phase);
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    particles.forEach(p => {
      const x = cx + (p.tx - cx) * s;
      const y = (canvas.height / 2 + 60) + (p.ty - (canvas.height / 2 + 60)) * s;

      ctx.beginPath();
      ctx.arc(x, y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 10;
      ctx.fill();
    });

    requestAnimationFrame(pulse);
  }

  pulse();
}
</script>

</body>
</html>
